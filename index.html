<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>סופר-קאר נגד החייזר!</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>🏎️</text></svg>">
<link rel="apple-touch-icon" href="icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="screen-orientation" content="landscape">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: #0a0a1a;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    touch-action: none;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
}
canvas {
    width: 100vw;
    height: 100vh;
    display: block;
}
#rotate-msg {
    display: none;
    position: fixed; inset: 0;
    background: #0a0a1a;
    color: #fff;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
    font-size: 22px;
    z-index: 100;
    text-align: center;
    gap: 20px;
}
#rotate-msg .icon { font-size: 60px; }
@media (max-width: 600px) and (orientation: portrait) {
    #rotate-msg { display: flex; }
    canvas { display: none; }
}
</style>
</head>
<body>
<div id="rotate-msg">
    <div class="icon">📱🔄</div>
    <div>סובב את המסך לרוחב כדי לשחק!</div>
</div>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
ctx.direction = 'rtl';
</script>
<script src="js/config.js"></script>
<script src="js/audio.js"></script>
<script src="js/input.js"></script>
<script src="js/particles.js"></script>
<script src="js/entities.js"></script>
<script src="js/collision.js"></script>
<script src="js/draw.js"></script>
<script src="js/main.js"></script>
</body>
</html>
